# openresty-leocdp.conf
# Thêm đoạn này vào config OpenResty hiện có trên host (ví dụ /etc/openresty/conf.d/)
# rồi reload: sudo openresty -s reload

# --- Admin Dashboard ---
server {
    listen 80;
    server_name admin.your-domain.com;
    client_max_body_size 30M;

    location / {
        proxy_pass http://127.0.0.1:8600/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
    }
}

# --- Event Observer / Data Hub ---
server {
    listen 80;
    server_name observer.your-domain.com;
    client_max_body_size 30M;

    location / {
        proxy_pass http://127.0.0.1:8601/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
    }
}

# Sau khi domain đã trỏ DNS đúng, dùng certbot để bật SSL:
#   sudo certbot --nginx -d admin.your-domain.com -d observer.your-domain.com
