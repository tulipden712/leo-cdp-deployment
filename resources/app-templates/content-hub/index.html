<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>404 - Page Not Found</title>

	<!-- Bootstrap 5 -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

	<!-- Bootstrap Icons -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

	<style>
		body {
			background: linear-gradient(135deg, #f8f9fa, #eef4ff);
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			overflow-x: hidden;
		}

		.card-404 {
			border: none;
			border-radius: 24px;
			box-shadow: 0 15px 45px rgba(0, 0, 0, .08);
			background: #fff;
		}

		.error-code {
			font-size: 9rem;
			font-weight: 900;
			line-height: 1;
			color: #0d6efd;
			letter-spacing: -6px;
		}

		.circle {
			width: 170px;
			height: 170px;
			border-radius: 50%;
			background: rgba(13, 110, 253, .08);
			display: flex;
			align-items: center;
			justify-content: center;
			margin: auto;
			animation: float 3s ease-in-out infinite;
		}

		.circle i {
			font-size: 70px;
			color: #0d6efd;
		}

		@keyframes float {
			0% {
				transform: translateY(0);
			}

			50% {
				transform: translateY(-12px);
			}

			100% {
				transform: translateY(0);
			}
		}

		.btn {
			border-radius: 50px;
			padding: .7rem 1.5rem;
		}

		.footer {
			color: #6c757d;
			font-size: .9rem;
		}

		@media(max-width:768px) {
			.error-code {
				font-size: 6rem;
			}

			.circle {
				width: 130px;
				height: 130px;
			}

			.circle i {
				font-size: 55px;
			}
		}
	</style>
</head>

<body>

	<div class="container">
		<div class="row justify-content-center">
			<div class="col-lg-8">

				<div class="card card-404 p-5 text-center">

					<div class="circle mb-4">
						<i class="bi bi-exclamation-triangle-fill"></i>
					</div>

					<div class="error-code">
						404
					</div>

					<h2 class="fw-bold mt-3">
						Oops! Page Not Found
					</h2>

					<p class="text-muted mb-4">
						The page you're looking for may have been moved,
						deleted, or never existed.
					</p>




					<hr class="my-4">

					<div class="footer">
						Error Code: <strong>404</strong> •
						Requested resource could not be found (Processed by the LEO server)
					</div>

				</div>

			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
